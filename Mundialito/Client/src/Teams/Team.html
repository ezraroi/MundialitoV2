<div class="row">
    <div class="col-xs-12">
        <div class="panel panel-default mu-entity-header">
            <div class="panel-body">
                <div class="media mu-entity-header__media">
                    <div class="media-left">
                        <img class="media-object mu-entity-header__logo" ng-src="{{team.Logo.toLowerCase()}}"
                            alt="{{team.Name}}">
                    </div>
                    <div class="media-body">
                        <h3 class="mu-entity-header__title">
                            <team-flag team="team"></team-flag>
                            {{team.Name}}
                            <span class="text-muted">({{team.ShortName}})</span>
                        </h3>
                        <p ng-show="team.TeamPage !== null" class="mu-entity-header__link">
                            <a target="_blank" rel="noopener" ng-href="{{team.TeamPage}}">
                                <i class="fa fa-bar-chart"></i> Team statistics
                            </a>
                        </p>
                        <button type="button" class="btn btn-info btn-sm"
                            ng-if="security.user && security.user.Roles === 'Admin'"
                            ng-click="toggleEditForm()">
                            <i class="fa fa-pencil-square"></i>
                            <span mundialito-toggle-text true-label="Hide edit" false-label="Edit team"
                                varieble="showEditForm">Edit team</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="row"
    ng-if="security.user && security.user.Roles === 'Admin'" ng-show="showEditForm" cg-busy="editTeamPromise">
    <div class="col-xs-12">
        <div class="panel panel-info">
            <div class="panel-heading"><i class="fa fa-pencil-square"></i> Edit team</div>
            <div class="panel-body">
                <form name="editTeamForm" novalidate>
                    <auto:fields fields="schema" data="team"></auto:fields>
                    <div class="url form-group">
                        <label class="control-label" for="integrationsData">Integrations</label>
                        <key-value-editor entries="IntegrationsData"></key-value-editor>
                    </div>
                    <button type="button" ng-click="updateTeam()" class="btn btn-primary btn-lg btn-block"
                        ng-disabled="editTeamForm.$invalid" tabindex="100">
                        <i class="fa-solid fa-floppy-disk"></i> Save</button>
                </form>
            </div>
        </div>
    </div>
</div>
<div class="row">
    <div class="col-xs-12">
        <div class="panel panel-info mu-panel-primary">
            <div class="panel-heading">
                <team-flag team="team"></team-flag>
                {{team.Name}} games
                <span ng-repeat="mark in teamsForm[team.TeamId].form">
                    <span ng-class="{'label-success': mark.mark === 'W', 'label-default': mark.mark === 'D', 'label-danger': mark.mark === 'L'}"
                        class="label">{{mark.mark}}</span>
                </span>
                <span class="pull-right badge" ng-if="games">{{games.length}}</span>
            </div>
            <div class="panel-body">
                <mundialito-games info="games" show-only="true"></mundialito-games>
            </div>
        </div>
    </div>
</div>
<div ng-if="plugins['team-squad'] && plugins['team-squad'].template">
    <div ng-include="plugins['team-squad'].template"></div>
</div>
